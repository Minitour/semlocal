name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-ci-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-ci-

      - name: Run unit tests
        run: cargo test --lib --no-default-features

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Generate coverage
        id: coverage
        run: |
          OUTPUT=$(cargo tarpaulin --lib --no-default-features 2>&1)
          echo "$OUTPUT"
          COVERAGE=$(echo "$OUTPUT" | grep -oP '^\d+\.\d+% coverage' | grep -oP '^\d+\.\d+')
          echo "pct=$COVERAGE" >> "$GITHUB_OUTPUT"

      - name: Publish coverage badge
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          PCT="${{ steps.coverage.outputs.pct }}"
          if [ -z "$PCT" ]; then
            echo "Coverage percentage not found, skipping badge update"
            exit 0
          fi

          # Pick color based on coverage
          COLOR="red"
          if awk "BEGIN {exit !($PCT >= 90)}"; then COLOR="brightgreen"
          elif awk "BEGIN {exit !($PCT >= 75)}"; then COLOR="green"
          elif awk "BEGIN {exit !($PCT >= 60)}"; then COLOR="yellow"
          elif awk "BEGIN {exit !($PCT >= 40)}"; then COLOR="orange"
          fi

          # Write shields.io endpoint JSON
          mkdir -p badge
          cat > badge/coverage.json <<EOF
          {
            "schemaVersion": 1,
            "label": "coverage",
            "message": "${PCT}%",
            "color": "${COLOR}"
          }
          EOF

          # Push to gh-pages branch
          cd badge
          git init
          git checkout -b gh-pages
          git add coverage.json
          git -c user.name="github-actions" -c user.email="actions@github.com" commit -m "Update coverage badge: ${PCT}%"
          git push --force "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" gh-pages

      - name: Check default build
        run: cargo check
